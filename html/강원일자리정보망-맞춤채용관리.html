<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년맞춤서비스</title>

    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/common.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/common_style.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/print.css" media="print" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/jquery-ui.min.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/jquery.bxslider.min.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/gwjob/css/aos.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/gwjob/css/newStyle.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/gwjob/css/newSub.css" />
    <link rel="stylesheet" href="https://job.gwd.go.kr/page/common/css/custom-dev.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="stylesheet" href="./css/youthservice.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body>

    <div class="youthservice-wrap">
        <div class="inner-section">

            <div class="ys-banner">
                
                <div class="ys-banner-cont youth" data-tab="youth">
                    <div class="ys-banner-txt">
                        <span class="ys-badge bg-blue">청년 맞춤 서비스</span>
                        <h2 class="ys-banner-tit">내 일을 위한 <strong class="c-blue">오늘의 선택!</strong></h2>
                        <p class="ys-banner-desc">청년을 위한 채용·정책·교육 정보를 한눈에 확인하세요.</p>
                    </div>
                </div>

                <div class="ys-banner-cont middle" data-tab="middle">
                    <div class="ys-banner-txt">
                        <span class="ys-badge bg-navy">중장년 맞춤 서비스</span>
                        <h2 class="ys-banner-tit">내 일을 위한 <strong class="c-navy">오늘의 선택!</strong></h2>
                        <p class="ys-banner-desc">중장년을 위한 채용 · 정책 · 교육 정보를 한눈에 확인하세요.</p>
                    </div>
                </div>

                <div class="ys-banner-cont woman" data-tab="woman">
                    <div class="ys-banner-txt">
                        <span class="ys-badge bg-pink">여성 맞춤 서비스</span>
                        <h2 class="ys-banner-tit">내 일을 위한 <strong class="c-pink">오늘의 선택!</strong></h2>
                        <p class="ys-banner-desc">여성을 위한 채용 · 정책 · 교육 정보를 한눈에 확인하세요.</p>
                    </div>
                </div>

            </div>

            <div class="ys-tab-menu">
                <ul class="ys-tab-list">
                    <li class="active youth" data-tab="youth"><button type="button">청년</button></li>
                    <li class="middle" data-tab="middle"><button type="button">중장년</button></li>
                    <li class="woman" data-tab="woman"><button type="button">여성</button></li>
                </ul>
            </div>

            <div class="ys-content">
                <div class="ys-content-wrap">
                    <div class="ys-content-item">

                    </div>
                </div>
                
            </div>

        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 1. 첫 로딩 시 청년('youth') 데이터만 노출
            $('[data-tab="youth"]').css('display', 'flex');

            // 2. 탭 클릭 이벤트
            $('.ys-tab-list li').on('click', function() {
                // 버튼 끄고 켜기
                $('.ys-tab-list li').removeClass('active');
                $(this).addClass('active');

                // 선택한 탭 키값 (youth, middle, woman)
                var targetTab = $(this).attr('data-tab');

                // 모든 배너 및 하단 일치시킬 카드들 우선 숨김
                $('.ys-banner-cont').hide(); 
                
                // 클릭한 탭과 일치하는 data-tab만 노출
                $('[data-tab="' + targetTab + '"]').css('display', 'flex');
            });
        });
    </script>
</body>
</html>
